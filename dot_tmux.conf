# Default shell
set-option -g default-shell /bin/zsh

# New window after current window
unbind c
bind c new-window -a

# Vi-style keybindings in copy mode
set -g mode-keys vi

# Use the terminal's native 'bg' and 'fg' (Background and Foreground)
set -g status-style "bg=default,fg=default"

# Use standard ANSI colors for highlights
set -g status-left "#[fg=cyan,bold]#S "
set -g window-status-current-style "fg=magenta,bold"

# Fix the Remote Color Issue
set -g default-terminal "xterm-256color"

# Fix ssh agent
# see https://werat.dev/blog/happy-ssh-agent-forwarding/ 
set-environment -g 'SSH_AUTH_SOCK' ~/.ssh/ssh_auth_sock
# avoid update-environment for SSH_AUTH_SOCK which seems to be default
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"

